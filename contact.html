<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Punjab Police B1 TEST App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0f0c1b; color: #ffffff; padding: 30px 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { background: #181528; border: 1px solid #25213b; padding: 40px 30px; border-radius: 20px; max-width: 550px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        h1 { color: #ffffff; border-bottom: 2px solid #8a4fff; padding-bottom: 12px; font-size: 1.8rem; font-weight: 700; margin-bottom: 20px; }
        p { color: #8b86a3; line-height: 1.6; font-size: 0.95rem; margin-bottom: 20px; }
        .info-box { background: #1f1b35; border: 1px solid #2d284e; padding: 15px 20px; border-radius: 12px; margin-bottom: 25px; }
        .info-item { margin-bottom: 10px; font-size: 0.95rem; color: #8b86a3; }
        .info-item strong { color: #ffffff; }
        .info-item a { color: #8a4fff; text-decoration: none; font-weight: 600; }
        .info-item a:hover { color: #9b66ff; }
        .back-btn { display: inline-block; margin-bottom: 25px; color: #8a4fff; text-decoration: none; font-weight: 600; font-size: 0.95rem; transition: color 0.2s; }
        .back-btn:hover { color: #9b66ff; }
        
        /* Contact Form Styling */
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 0.75rem; font-weight: 700; color: #8b86a3; margin-bottom: 8px; letter-spacing: 1px; }
        input, textarea { background-color: #1f1b35; border: 1px solid #2d284e; color: #ffffff; padding: 12px 14px; border-radius: 10px; font-size: 0.95rem; outline: none; width: 100%; transition: border-color 0.3s; }
        input:focus, textarea:focus { border-color: #8a4fff; }
        textarea { resize: vertical; height: 100px; }
        .submit-btn { background: #8a4fff; color: #ffffff; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 10px; box-shadow: 0 5px 15px rgba(138, 79, 255, 0.3); transition: all 0.3s; width: 100%; }
        .submit-btn:hover { background: #9b66ff; transform: translateY(-1px); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn">⬅️ Back to App</a>
        <h1>Contact Us</h1>
        <p>Have questions regarding your mock test subscriptions, payment failures, or technical issues? Get in touch with our team.</p>
        
        <div class="info-box">
            <div class="info-item"><strong>📧 Support Email:</strong> <a href="mailto:ppb1testapp@protonmail.com">ppb1testapp@protonmail.com</a></div>
            <div class="info-item"><strong>⏰ Response Time:</strong> Within 24-48 Hours</div>
        </div>

        <form onsubmit="alert('Thank you! Your message has been sent successfully.'); return false;">
            <div class="form-group">
                <label>YOUR NAME</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>YOUR EMAIL</label>
                <input type="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>MESSAGE / COMPLAINT</label>
                <textarea placeholder="Type your query here..." required></textarea>
            </div>
            <button type="submit" class="submit-btn">Send Message ✉️</button>
        </form>
    </div>
</body>
</html>
