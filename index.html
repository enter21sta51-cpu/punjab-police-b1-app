<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punjab Police B1 TEST App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0f0c1b; color: #ffffff; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .main-container { background: #181528; border: 1px solid #25213b; padding: 30px; border-radius: 20px; max-width: 500px; width: 100%; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        h2 { text-align: center; margin-bottom: 20px; color: #ffffff; }
        .tab-container { display: flex; margin-bottom: 20px; border-bottom: 2px solid #2d284e; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #8b86a3; font-weight: 600; }
        .tab.active { color: #8a4fff; border-bottom: 2px solid #8a4fff; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 0.8rem; color: #8b86a3; margin-bottom: 5px; font-weight: 600; }
        input { background: #1f1b35; border: 1px solid #2d284e; color: #ffffff; padding: 12px; border-radius: 10px; outline: none; }
        input:focus { border-color: #8a4fff; }
        .btn-primary { background: #8a4fff; color: #ffffff; border: none; padding: 14px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .btn-back { background: none; border: none; color: #8b86a3; cursor: pointer; margin-bottom: 15px; font-weight: 600; }
        .menu-btn { background: #1f1b35; border: 1px solid #2d284e; color: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; width: 100%; text-align: left; cursor: pointer; font-size: 1rem; }
    </style>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="auth-screen" class="main-container">
        <div class="tab-container">
            <div id="login-tab" class="tab active" onclick="switchAuthTab('login')">Login</div>
            <div id="register-tab" class="tab" onclick="switchAuthTab('register')">Register</div>
        </div>
        
        <div id="name-field" class="form-group" style="display: none;">
            <label>FULL NAME</label>
            <input type="text" id="auth-name" placeholder="Enter your name">
        </div>
        <div id="phone-field" class="form-group" style="display: none;">
            <label>PHONE NUMBER</label>
            <input type="text" id="auth-phone" placeholder="Enter phone number">
        </div>
        <div class="form-group">
            <label>EMAIL ADDRESS</label>
            <input type="email" id="auth-email" placeholder="Enter email">
        </div>
        <div class="form-group">
            <label>PASSWORD</label>
            <input type="password" id="auth-password" placeholder="Enter password">
        </div>

        <button id="login-btn-submit" class="btn-primary" onclick="processLogin()">Login Karo 🔓</button>
        <button id="register-btn-submit" class="btn-primary" onclick="processRegister()" style="display: none;">Register Karo 🎉</button>
    </div>

    <div id="dashboard-screen" class="main-container" style="display: none;">
        <h2 id="user-welcome-name">Ji Aayan Nu!</h2>
        <p style="text-align: center; color: #8b86a3; margin-bottom: 20px;">Status: <span id="user-status-badge">FREE</span></p>
        
        <button id="admin-panel-btn" class="menu-btn" style="display: none; background: #22c55e; border-color: #4ade80;" onclick="switchView('admin-screen')">⚙️ Admin Panel (Add Questions)</button>
        
        <button class="menu-btn" onclick="alert('Mock Test Starting...')">📝 Mock Test</button>
        <button class="menu-btn" onclick="alert('Opening Study Notes...')">📚 Study Notes</button>
        <button class="menu-btn" onclick="firebase.auth().signOut()">🚪 Logout</button>
    </div>

    <div id="admin-screen" class="main-container" style="display: none;">
        <button class="btn-back" onclick="switchView('dashboard-screen')">⬅️ Back to Dashboard</button>
        <h2>⚙️ Add New Question</h2>
        <div class="form-group">
            <label>QUESTION (ਸਵਾਲ)</label>
            <input type="text" id="admin-question" placeholder="Type question here...">
            <br>
            <label>OPTION A</label>
            <input type="text" id="admin-opt-a" placeholder="Option A">
            <br>
            <label>OPTION B</label>
            <input type="text" id="admin-opt-b" placeholder="Option B">
            <br>
            <label>OPTION C</label>
            <input type="text" id="admin-opt-c" placeholder="Option C">
            <br>
            <label>OPTION D</label>
            <input type="text" id="admin-opt-d" placeholder="Option D">
            <br>
            <label>CORRECT ANSWER (A, B, C, or D)</label>
            <input type="text" id="admin-correct" placeholder="e.g. A" style="text-transform: uppercase;">
            
            <button class="btn-primary" onclick="saveQuestionToFirestore()" style="background: #22c55e;">Save Question 🚀</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function switchAuthTab(tab) {
            const loginTab = document.getElementById('login-tab');
            const registerTab = document.getElementById('register-tab');
            const nameField = document.getElementById('name-field');
            const phoneField = document.getElementById('phone-field');
            const loginBtn = document.getElementById('login-btn-submit');
            const regBtn = document.getElementById('register-btn-submit');

            if (tab === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                nameField.style.display = 'none';
                phoneField.style.display = 'none';
                loginBtn.style.display = 'block';
                regBtn.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                nameField.style.display = 'block';
                phoneField.style.display = 'block';
                loginBtn.style.display = 'none';
                regBtn.style.display = 'block';
            }
        }

        function switchView(viewId) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('admin-screen').style.display = 'none';
            document.getElementById(viewId).style.display = 'block';
        }
    </script>
</body>
</html>
